<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KGUARD — Security Scanner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="wordmark">KGUARD</div>
        <div class="tagline">Local Security Scanner</div>
      </div>

      <div class="service-badge">
        <div class="flex-center gap-8">
          <span class="dot" id="serviceDot"></span>
          <span class="service-label">Service: <span id="serviceText">—</span></span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-title" style="margin-top:8px;">Navigation</div>
        <button class="nav-link active" onclick="navigate('dashboard')" id="nav-dashboard">
          <span class="icon">▦</span> Dashboard
        </button>
        <button class="nav-link" onclick="navigate('scan')" id="nav-scan">
          <span class="icon">⊕</span> New Scan
        </button>
        <button class="nav-link" onclick="navigate('results')" id="nav-results">
          <span class="icon">☰</span> Results
        </button>
        <button class="nav-link" onclick="navigate('settings')" id="nav-settings">
          <span class="icon">⚙</span> Settings
        </button>
      </nav>

      <div class="sidebar-footer">
        <span>v2.0.0</span>
        <span>Scans today: <span id="scansToday">0</span></span>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <span class="topbar-title" id="topbarTitle">Dashboard</span>
        <div class="topbar-right">
          <button class="btn-topbar" id="btnActivate" onclick="toggleService()">Activate</button>
        </div>
      </header>

      <main class="content" id="pageContent"></main>
    </div>

  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
