<!DOCTYPE html>
<html>
<head>
    <title>Configuración - KGUARD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="settings-page">
        <h1>Configuración</h1>
        
        <div class="settings-section">
            <h2>General</h2>
            <div class="form-group">
                <label>Puerto del servicio:</label>
                <input type="number" id="servicePort" value="1717" disabled>
                <small>El puerto no se puede cambiar mientras el servicio está activo</small>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="autoStart"> Iniciar servicio al arrancar
                </label>
            </div>
        </div>
        
        <div class="settings-section">
            <h2>Escaneo</h2>
            <div class="form-group">
                <label>Timeout por defecto (segundos):</label>
                <input type="number" id="scanTimeout" value="300">
            </div>
            <div class="form-group">
                <label>Escaneos concurrentes máximos:</label>
                <input type="number" id="maxConcurrent" value="3" min="1" max="10">
            </div>
        </div>
        
        <div class="settings-section">
            <h2>Bases de Datos</h2>
            <div class="form-group">
                <label>VirusTotal API Key:</label>
                <input type="password" id="vtApiKey" placeholder="Opcional">
            </div>
            <div class="form-group">
                <button id="updateSourcesBtn" class="btn">Actualizar Fuentes de Amenazas</button>
            </div>
            <div class="intel-sources" id="intelSources">
                <!-- Estado de fuentes -->
            </div>
        </div>
        
        <div class="settings-section">
            <h2>Almacenamiento</h2>
            <div class="form-group">
                <p>Directorio de escaneos: <span id="scansDir">./scans/</span></p>
                <p>Espacio usado: <span id="diskUsage">Calculando...</span></p>
            </div>
        </div>
        
        <div class="settings-actions">
            <button id="saveSettingsBtn" class="btn btn-primary">Guardar Configuración</button>
        </div>
    </div>
    
    <script src="js/settings.js"></script>
</body>
</html>
